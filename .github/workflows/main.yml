name: Train-Shadow-Model
on: [push]
jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run training
        run: python data_pipeline.py
      - name: Upload Model
        uses: actions/upload-artifact@v4
        with:
          name: shadow-v2-artifact # Nombre del paquete
          path: |
            shadow_model_v2.keras
            shadow_model_v2.tflite

